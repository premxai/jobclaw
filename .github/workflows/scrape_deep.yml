name: "🔍 Deep Tier — LinkedIn, Indeed, Glassdoor via Brave Search (Daily)"

# ┌────────────────────────────────────────────────────────────────────┐
# │  DEEP TIER — runs twice daily at 6 AM and 6 PM UTC               │
# │  Scraper: Brave Search API (LinkedIn, Indeed, Glassdoor)          │
# │           Falls back to OpenClaw if no BRAVE_SEARCH_API_KEY set   │
# │  + RSS + GitHub for fresh baseline                                │
# │  Duration: ~1-2 minutes (Brave) or ~15-30 minutes (OpenClaw)     │
# └────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: '0 18 * * *'    # 6 PM UTC daily (1 PM EST)
  workflow_dispatch:

jobs:
  deep-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Only install Node/Playwright if falling back to OpenClaw
      - name: Install OpenClaw (fallback only)
        if: ${{ !env.BRAVE_SEARCH_API_KEY }}
        run: |
          npm install -g @openclaw/cli || true
          pip install playwright && playwright install chromium --with-deps || true
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}

      - name: Run deep-tier scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_CHANNEL_AI: ${{ secrets.DISCORD_CHANNEL_AI }}
          DISCORD_CHANNEL_SWE: ${{ secrets.DISCORD_CHANNEL_SWE }}
          DISCORD_CHANNEL_DATA: ${{ secrets.DISCORD_CHANNEL_DATA }}
          DISCORD_CHANNEL_NEWGRAD: ${{ secrets.DISCORD_CHANNEL_NEWGRAD }}
          DISCORD_CHANNEL_PRODUCT: ${{ secrets.DISCORD_CHANNEL_PRODUCT }}
          DISCORD_CHANNEL_RESEARCH: ${{ secrets.DISCORD_CHANNEL_RESEARCH }}
        run: |
          python scripts/ingestion/run_all_scrapers.py \
            --tier deep \
            --window 24
