name: "🌊 Deep Tier — All 27,923 Companies (Daily 11PM UTC)"

# ┌────────────────────────────────────────────────────────────────────┐
# │  MANUAL EMERGENCY TRIGGER ONLY — scheduling owned by Railway worker│
# │  The Railway ARQ worker enqueues task_deep daily at 23:00 UTC via  │
# │  APScheduler. Use this workflow only for manual testing/recovery.  │
# └────────────────────────────────────────────────────────────────────┘

on:
  workflow_dispatch:    # Manual trigger only — cron disabled (Railway worker owns scheduling)

permissions:
  contents: write              # Needed to push dedup file back to repo

jobs:
  deep-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run deep-tier scrapers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: |
          python scripts/ingestion/run_all_scrapers.py \
            --tier deep \
            --window 24

      - name: Commit dedup file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
