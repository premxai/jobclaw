name: "🌊 Deep Tier — Daily Full Sweep"

# ┌────────────────────────────────────────────────────────────────────┐
# │  SCHEDULED DEEP TIER — full scrape/enrichment sweep once per day.  │
# │  Runs at 08:17 Eastern, away from registry and hourly scrapes.     │
# │  GitHub cron is UTC; 12:17 UTC maps to 08:17 Eastern during EDT.   │
# └────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:         # Manual trigger for testing/recovery

permissions:
  contents: write              # Needed to push dedup file back to repo

concurrency:
  group: deep-scraper
  cancel-in-progress: false

jobs:
  deep-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Check production DB availability
        id: db-preflight
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ops/github_db_preflight.py

      - name: Skip while production DB is unavailable
        if: steps.db-preflight.outputs.db_ok != 'true'
        run: |
          echo "Skipping deep scraper because production DB is unavailable."
          echo "Reason: ${{ steps.db-preflight.outputs.reason }}"

      - name: Run deep-tier scrapers
        if: steps.db-preflight.outputs.db_ok == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOBCLAW_QUEUE_MODE: "active"
          JOBCLAW_QUEUE_LEASE_SECONDS: "300"
          JOBCLAW_DEEP_TARGET_LIMIT: "1200"
          JOBCLAW_ORCHESTRATOR_TIMEOUT_SECONDS: "1500"
          JOBCLAW_SKIP_AI_PIPELINE: "1"
          JOBCLAW_DEGRADED_FAILS_WORKFLOW: "0"
          JOBCLAW_DIRECT_SOURCE_ONLY: "1"
          JOBCLAW_BRAVE_ENRICHMENT_ONLY: "1"
          JOBCLAW_DISCORD_DRY_RUN: "0"
          JOBCLAW_DISCORD_STRICT_QUALITY: "1"
          JOBCLAW_DISCORD_US_ONLY: "1"
          JOBCLAW_DISCORD_MAX_POSTS: "50"
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_GENERAL: ${{ secrets.DISCORD_WEBHOOK_GENERAL }}
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: |
          python scripts/ingestion/run_all_scrapers.py \
            --tier deep \
            --window 24

      - name: Commit dedup file
        if: ${{ always() && steps.db-preflight.outputs.db_ok == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
