name: "🔥 Hot Scraper — 192 Companies Every 15min"

# ┌──────────────────────────────────────────────────────────────────────┐
# │  SCHEDULED HOT SWEEP — high-priority company monitoring.            │
# │  Runs every 15 minutes in Eastern Time, staggered from Discord.     │
# │  GitHub cron is UTC; minute cadence is unchanged across timezones.  │
# └──────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:         # Manual trigger for testing/recovery

permissions:
  contents: write

concurrency:
  group: hot-scraper
  cancel-in-progress: false  # Let in-flight runs finish; DB dedup/leases prevent duplicate work

jobs:
  hot-scrape:
    name: Hot Scraper Run
    runs-on: ubuntu-latest
    timeout-minutes: 20      # Setup + 192-target hot sweep + Discord alert buffer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check production DB availability
        id: db-preflight
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ops/github_db_preflight.py

      - name: Skip while production DB is unavailable
        if: steps.db-preflight.outputs.db_ok != 'true'
        run: |
          echo "Skipping hot scraper because production DB is unavailable."
          echo "Reason: ${{ steps.db-preflight.outputs.reason }}"

      - name: Run hot company scraper
        if: steps.db-preflight.outputs.db_ok == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_GENERAL: ${{ secrets.DISCORD_WEBHOOK_GENERAL }}
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
          JOBCLAW_DISCORD_US_ONLY: "1"
        run: python scripts/ingestion/scrape_hot.py

      - name: Commit updated posted_hashes (if changed)
        if: steps.db-preflight.outputs.db_ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          if git diff --cached --quiet; then
            echo "No hash updates."
          else
            git commit -m "chore: update posted_hashes.json [skip ci]"
            git push origin main
          fi
