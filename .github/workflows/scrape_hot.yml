name: "🔥 Hot Scraper — 192 Companies Every 15min"

# ┌──────────────────────────────────────────────────────────────────────┐
# │  SCHEDULED HOT SWEEP — high-priority company monitoring.            │
# │  Runs every 15 minutes in Eastern Time, staggered from Discord.     │
# │  GitHub cron is UTC; minute cadence is unchanged across timezones.  │
# └──────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:         # Manual trigger for testing/recovery

permissions:
  contents: write

concurrency:
  group: hot-scraper
  cancel-in-progress: true  # Cancel older run if next 5-min trigger fires

jobs:
  hot-scrape:
    name: Hot Scraper Run
    runs-on: ubuntu-latest
    timeout-minutes: 15      # Setup + 192-target hot sweep

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hot company scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: python scripts/ingestion/scrape_hot.py

      - name: Commit updated posted_hashes (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          if git diff --cached --quiet; then
            echo "No hash updates."
          else
            git commit -m "chore: update posted_hashes.json [skip ci]"
            git push origin main
          fi
