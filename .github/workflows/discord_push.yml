name: "📢 Discord Push — Post Unposted Jobs (Every 15min)"

# ┌──────────────────────────────────────────────────────────────────────┐
# │  SCHEDULED DISCORD PUSH — posts accepted direct-source jobs.         │
# │  Runs every 15 minutes, offset after hot/fast/medium scrapes.        │
# └──────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: "14,29,44,59 * * * *"
  workflow_dispatch:         # Manual trigger for testing/recovery

permissions:
  contents: write

concurrency:
  group: discord-push
  cancel-in-progress: true

jobs:
  discord-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Discord push script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOBCLAW_DISCORD_DRY_RUN: "0"
          JOBCLAW_DISCORD_STRICT_QUALITY: "1"
          JOBCLAW_DIRECT_SOURCE_ONLY: "1"
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: python scripts/discord_push.py

      - name: Commit updated posted_hashes (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          if git diff --cached --quiet; then
            echo "No hash updates."
          else
            git commit -m "chore: update posted_hashes.json [skip ci]"
            git push origin main
          fi
