name: CI/CD — Lint, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short || true

      - name: Verify API imports
        run: |
          python -c "from api.main import app; print('Routes:', len(app.routes))"

      - name: Verify scraper imports
        run: |
          python -c "from scripts.database.db_utils import get_connection; print('DB OK')"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for the secret scan

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Dependency CVE audit. Non-blocking for now (report-only) so a transitive
      # advisory doesn't block deploys; drop the `|| true` to make it gating.
      - name: pip-audit (dependency CVEs)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc || true

      # Secret scan over the whole git history. Non-blocking until a baseline exists;
      # remove `continue-on-error` to make committed secrets fail the build.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

