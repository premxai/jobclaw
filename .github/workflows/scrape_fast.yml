name: "🚀 Fast Tier — RSS + GitHub (Every Hour)"

# ┌────────────────────────────────────────────────────────────────────┐
# │  FAST TIER — runs every hour                                       │
# │  Scrapers: RSS feeds + GitHub job-board repos                     │
# │  Duration: ~5-10 minutes per run                                   │
# │  Coverage: RemoteOK, Remotive, WWR, Dice, Wellfound, YC, GitHub   │
# └────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: '0 * * * *'       # Top of every hour
  workflow_dispatch:

permissions:
  contents: write              # Needed to push dedup file back to repo

jobs:
  fast-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # Playwright install + scraping needs ~15min

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run fast-tier scrapers (RSS + GitHub)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_CHANNEL_AI: ${{ secrets.DISCORD_CHANNEL_AI }}
          DISCORD_CHANNEL_SWE: ${{ secrets.DISCORD_CHANNEL_SWE }}
          DISCORD_CHANNEL_DATA: ${{ secrets.DISCORD_CHANNEL_DATA }}
          DISCORD_CHANNEL_NEWGRAD: ${{ secrets.DISCORD_CHANNEL_NEWGRAD }}
          DISCORD_CHANNEL_PRODUCT: ${{ secrets.DISCORD_CHANNEL_PRODUCT }}
          DISCORD_CHANNEL_RESEARCH: ${{ secrets.DISCORD_CHANNEL_RESEARCH }}
        run: |
          python scripts/ingestion/run_all_scrapers.py \
            --tier fast \
            --window 24 \
            --skip-ats

      - name: Commit dedup file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
