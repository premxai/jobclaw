name: "🚀 Fast Tier — RSS + GitHub + Greenhouse/Lever/Ashby (Every Hour)"

# ┌────────────────────────────────────────────────────────────────────┐
# │  FAST TIER — runs every hour                                       │
# │  Scrapers: RSS feeds + GitHub repos + Group A ATS (4-shard)       │
# │  ATS Group A: Greenhouse + Lever + Ashby (~10,801 total)          │
# │  4-shard DB rotation = ~2,700 companies/run, full coverage/4hr    │
# │  Duration: ~8-12 minutes per run                                   │
# └────────────────────────────────────────────────────────────────────┘

on:
  workflow_dispatch:    # Manual trigger only — cron disabled (Railway worker owns scheduling)

permissions:
  contents: write              # Needed to push dedup file back to repo

jobs:
  fast-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25        # Setup ~90s + sharded ATS (~8-12min) + buffer

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run fast-tier scrapers (RSS + GitHub + Greenhouse/Lever/Ashby)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: |
          python scripts/ingestion/run_all_scrapers.py \
            --tier fast

      - name: Commit dedup file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
