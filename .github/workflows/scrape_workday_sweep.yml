name: "🌙 Workday Sweep — Long-tail Coverage"

# ┌────────────────────────────────────────────────────────────────────┐
# │  GATED WORKDAY SWEEP — weekly long-tail recovery for Workday        │
# │  targets when DB capacity and scraper health are safe.              │
# │                                                                     │
# │  Scheduled runs use conservative limits. Manual force can bypass    │
# │  guardrails for recovery, with larger target and budget inputs.     │
# │  The aging-fairness ordering (JOBCLAW_AGING_DAYS) means each sweep   │
# │  claims the *oldest-overdue* Workday targets first, so coverage      │
# │  rotates predictably instead of starving low-priority slugs.        │
# │                                                                     │
# │  Politeness is unchanged: per-host RPS + circuit breaker still cap  │
# │  request rate, so a long budget = more time scraping, not faster.   │
# └────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: "23 9 * * 0"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass guardrails for manual recovery"
        required: false
        default: false
        type: boolean
      target_limit:
        description: "Manual target limit override"
        required: false
        default: "5000"
      budget_seconds:
        description: "Manual Workday budget override"
        required: false
        default: "3000"

permissions:
  contents: write              # Needed to push dedup file back to repo

concurrency:
  group: workday-sweep
  cancel-in-progress: false    # let an in-flight sweep finish; don't thrash leases

jobs:
  workday-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Check production DB availability
        id: db-preflight
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ops/github_db_preflight.py

      - name: Skip while production DB is unavailable
        if: steps.db-preflight.outputs.db_ok != 'true'
        run: |
          echo "Skipping Workday sweep because production DB is unavailable."
          echo "Reason: ${{ steps.db-preflight.outputs.reason }}"

      - name: Check Workday sweep guardrails
        id: workday_guard
        if: steps.db-preflight.outputs.db_ok == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOBCLAW_WORKDAY_SWEEP_FORCE: ${{ github.event.inputs.force || 'false' }}
          JOBCLAW_WORKDAY_SWEEP_MAX_ACCEPTED_UNPOSTED: "1000"
          JOBCLAW_WORKDAY_SWEEP_MAX_TOTAL_JOBS: "50000"
          JOBCLAW_WORKDAY_SWEEP_MAX_RECENT_BAD_RUNS: "2"
        run: python scripts/ops/workday_sweep_guard.py

      - name: Skip while Workday guardrails are not safe
        if: steps.db-preflight.outputs.db_ok == 'true' && steps.workday_guard.outputs.should_run != 'true'
        run: |
          echo "Skipping Workday sweep because guardrails blocked it."
          echo "Reason: ${{ steps.workday_guard.outputs.reason }}"

      - name: Sweep Workday (unsharded, oldest-overdue first)
        if: steps.db-preflight.outputs.db_ok == 'true' && steps.workday_guard.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOBCLAW_QUEUE_MODE: "active"
          # Lease must outlast the long run so claimed targets aren't re-grabbed mid-sweep.
          JOBCLAW_QUEUE_LEASE_SECONDS: "3300"
          # Scheduled weekly uses the safe defaults; manual force can request a larger sweep.
          JOBCLAW_PLATFORM_BUDGET_SECONDS_WORKDAY: ${{ github.event.inputs.budget_seconds || '1200' }}
          JOBCLAW_MEDIUM_TARGET_LIMIT: ${{ github.event.inputs.target_limit || '1200' }}
          JOBCLAW_DEGRADED_FAILS_WORKFLOW: "0"
          JOBCLAW_DIRECT_SOURCE_ONLY: "1"
          JOBCLAW_BRAVE_ENRICHMENT_ONLY: "1"
          JOBCLAW_DISCORD_DRY_RUN: "0"
          JOBCLAW_DISCORD_STRICT_QUALITY: "1"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_GENERAL: ${{ secrets.DISCORD_WEBHOOK_GENERAL }}
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: |
          python scripts/ingestion/run_all_scrapers.py \
            --tier medium \
            --platforms workday \
            --no-shard \
            --window 24

      - name: Commit dedup file
        if: ${{ always() && steps.db-preflight.outputs.db_ok == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
