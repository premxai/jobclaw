name: "⚡ Medium Tier — Workday/Rippling/SmartRecruiters (Hourly, 8-Shard)"

# ┌────────────────────────────────────────────────────────────────────┐
# │  MANUAL EMERGENCY TRIGGER ONLY — scheduling owned by Railway worker│
# │  The Railway ARQ worker enqueues task_medium hourly at :02 via    │
# │  APScheduler. Use this workflow only for manual testing/recovery.  │
# └────────────────────────────────────────────────────────────────────┘

on:
  workflow_dispatch:    # Manual trigger only — cron disabled (Railway worker owns scheduling)
    inputs:
      shard:
        description: 'Shard override (0-3, or "auto")'
        default: 'auto'

permissions:
  contents: write              # Needed to push dedup file back to repo

jobs:
  medium-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run medium-tier scrapers (Workday/Rippling/SmartRecruiters/BambooHR, 8-shard)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: |
          # Shard rotation handled by orchestrator via DB (medium_ats_workday key, 8 shards)
          python scripts/ingestion/run_all_scrapers.py \
            --tier medium \
            --window 8 \
            --total-shards 8

      - name: Commit dedup file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
