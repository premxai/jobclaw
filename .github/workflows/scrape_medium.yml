name: "⚡ Medium Tier — ATS Companies, Sharded (Hourly Rotation)"

# ┌────────────────────────────────────────────────────────────────────┐
# │  MEDIUM TIER — runs every hour, rotates through 4 shards          │
# │  Scrapers: Greenhouse, Lever, Ashby, SmartRecruiters,             │
# │            Rippling, Workable, + Enterprise (Apple/Google/etc)    │
# │  Strategy: 4 shards × ~3,000 companies each, 1 shard per hour    │
# │    Hour 0 → shard 0  (~3k companies)                              │
# │    Hour 1 → shard 1  (~3k companies)                              │
# │    Hour 2 → shard 2  (~3k companies)                              │
# │    Hour 3 → shard 3  (~3k companies)                              │
# │    Hour 4 → shard 0  (cycle restarts — full coverage every 4h)   │
# │  Duration: ~8-15 minutes per run                                  │
# └────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:
    inputs:
      shard:
        description: 'Shard override (0-3, or "auto")'
        default: 'auto'

permissions:
  contents: write              # Needed to push dedup file back to repo

jobs:
  medium-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run medium-tier scrapers (ATS + Enterprise, sharded)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_CHANNEL_AI: ${{ secrets.DISCORD_CHANNEL_AI }}
          DISCORD_CHANNEL_SWE: ${{ secrets.DISCORD_CHANNEL_SWE }}
          DISCORD_CHANNEL_DATA: ${{ secrets.DISCORD_CHANNEL_DATA }}
          DISCORD_CHANNEL_NEWGRAD: ${{ secrets.DISCORD_CHANNEL_NEWGRAD }}
          DISCORD_CHANNEL_PRODUCT: ${{ secrets.DISCORD_CHANNEL_PRODUCT }}
          DISCORD_CHANNEL_RESEARCH: ${{ secrets.DISCORD_CHANNEL_RESEARCH }}
        run: |
          # Determine shard: use manual input or auto-rotate by hour
          SHARD_INPUT="${{ github.event.inputs.shard }}"
          if [ "$SHARD_INPUT" = "auto" ] || [ -z "$SHARD_INPUT" ]; then
            SHARD=$(( $(date +%H) % 4 ))
          else
            SHARD=$SHARD_INPUT
          fi
          echo "Running shard $SHARD/4"
          # Window=4 is safe now — each shard runs once every 4 hours (no gaps)
          python scripts/ingestion/run_all_scrapers.py \
            --tier medium \
            --window 4 \
            --shard $SHARD \
            --skip-openclaw

      - name: Commit dedup file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
