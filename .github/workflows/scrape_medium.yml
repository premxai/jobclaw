name: "⚡ Medium Tier — Hourly Slow ATS"

# ┌────────────────────────────────────────────────────────────────────┐
# │  SCHEDULED MEDIUM TIER — Workday/Rippling/SmartRecruiters/BambooHR │
# │  Runs hourly at :33 Eastern, offset from fast tier and Discord.    │
# │  GitHub cron is UTC; minute cadence is unchanged across timezones. │
# └────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: "33 * * * *"
  workflow_dispatch:         # Manual trigger for testing/recovery
    inputs:
      shard:
        description: 'Shard override (0-15, or "auto")'
        default: 'auto'

permissions:
  contents: write              # Needed to push dedup file back to repo

concurrency:
  group: medium-scraper
  cancel-in-progress: true

jobs:
  medium-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run medium-tier scrapers (Workday/Rippling/SmartRecruiters/BambooHR, 16-shard)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOBCLAW_QUEUE_MODE: "active"
          JOBCLAW_QUEUE_LEASE_SECONDS: "300"
          JOBCLAW_MEDIUM_TARGET_LIMIT: "800"
          JOBCLAW_WORKDAY_SHARDS: "16"
          JOBCLAW_DEGRADED_FAILS_WORKFLOW: "0"
          JOBCLAW_DIRECT_SOURCE_ONLY: "1"
          JOBCLAW_BRAVE_ENRICHMENT_ONLY: "1"
          JOBCLAW_DISCORD_DRY_RUN: "0"
          JOBCLAW_DISCORD_STRICT_QUALITY: "1"
          DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
          DISCORD_WEBHOOK_SWE: ${{ secrets.DISCORD_WEBHOOK_SWE }}
          DISCORD_WEBHOOK_DATA: ${{ secrets.DISCORD_WEBHOOK_DATA }}
          DISCORD_WEBHOOK_NEWGRAD: ${{ secrets.DISCORD_WEBHOOK_NEWGRAD }}
          DISCORD_WEBHOOK_PRODUCT: ${{ secrets.DISCORD_WEBHOOK_PRODUCT }}
          DISCORD_WEBHOOK_RESEARCH: ${{ secrets.DISCORD_WEBHOOK_RESEARCH }}
        run: |
          # Shard rotation handled by orchestrator via DB (medium_ats_workday key, 16 shards)
          python scripts/ingestion/run_all_scrapers.py \
            --tier medium \
            --window 8 \
            --total-shards 16

      - name: Commit dedup file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
