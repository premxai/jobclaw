name: "⚡ Medium Tier — Workday/Rippling/SmartRecruiters (Hourly, 8-Shard)"

# ┌────────────────────────────────────────────────────────────────────┐
# │  MEDIUM TIER — runs every hour, rotates through 8 shards          │
# │  ATS Group B: Workday (15,848) + Rippling (1,323) +               │
# │               SmartRecruiters (179) + BambooHR (7)                │
# │  Strategy: Workday 15,848 / 8 shards = ~2,000 companies/run      │
# │  Full Workday coverage every 8 hours                               │
# │  Duration: ~20-30 minutes per run                                  │
# └────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:
    inputs:
      shard:
        description: 'Shard override (0-3, or "auto")'
        default: 'auto'

permissions:
  contents: write              # Needed to push dedup file back to repo

jobs:
  medium-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run medium-tier scrapers (Workday/Rippling/SmartRecruiters/BambooHR, 8-shard)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_CHANNEL_AI: ${{ secrets.DISCORD_CHANNEL_AI }}
          DISCORD_CHANNEL_SWE: ${{ secrets.DISCORD_CHANNEL_SWE }}
          DISCORD_CHANNEL_DATA: ${{ secrets.DISCORD_CHANNEL_DATA }}
          DISCORD_CHANNEL_NEWGRAD: ${{ secrets.DISCORD_CHANNEL_NEWGRAD }}
          DISCORD_CHANNEL_PRODUCT: ${{ secrets.DISCORD_CHANNEL_PRODUCT }}
          DISCORD_CHANNEL_RESEARCH: ${{ secrets.DISCORD_CHANNEL_RESEARCH }}
        run: |
          # Shard rotation handled by orchestrator via DB (medium_ats_workday key, 8 shards)
          python scripts/ingestion/run_all_scrapers.py \
            --tier medium \
            --window 8

      - name: Commit dedup file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_hashes.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_hashes.json [skip ci]"
          git push || true
