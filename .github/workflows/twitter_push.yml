name: "🐦 Twitter Digest — New Roles Every 3h"

# ┌──────────────────────────────────────────────────────────────────────┐
# │  SCHEDULED TWITTER/X DIGEST — one summary tweet of new roles per run. │
# │  Runs every 3 hours (~8 tweets/day) to stay under the X free-tier     │
# │  monthly write cap. NOT a per-job firehose.                          │
# │                                                                      │
# │  Dry-run by default: it only posts for real once you set             │
# │  JOBCLAW_TWITTER_DRY_RUN=0 below AND add the four X_* repo secrets.   │
# └──────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: "20 */3 * * *"     # every 3 hours at :20, offset from other jobs
  workflow_dispatch:           # Manual trigger for testing

permissions:
  contents: write              # to commit the tweeted-hash dedup file

concurrency:
  group: twitter-digest
  cancel-in-progress: false

jobs:
  twitter-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check production DB availability
        id: db-preflight
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ops/github_db_preflight.py

      - name: Skip while production DB is unavailable
        if: steps.db-preflight.outputs.db_ok != 'true'
        run: |
          echo "Skipping Twitter digest because production DB is unavailable."
          echo "Reason: ${{ steps.db-preflight.outputs.reason }}"

      - name: Post Twitter digest
        if: steps.db-preflight.outputs.db_ok == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Flip to "0" once the X_* secrets are configured to go live.
          JOBCLAW_TWITTER_DRY_RUN: "1"
          JOBCLAW_TWITTER_WINDOW_HOURS: "3"
          # Keep "0": a post WITH a URL costs X $0.20 vs $0.015 plain (~13x). Put the
          # job-board link in the X profile bio instead. Set "1" only to accept the cost.
          JOBCLAW_TWITTER_INCLUDE_URL: "0"
          JOBCLAW_WEB_URL: ${{ vars.JOBCLAW_WEB_URL || 'https://norinote.xyz' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/twitter_push.py

      - name: Commit updated tweeted_hashes (if changed)
        if: steps.db-preflight.outputs.db_ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tweeted_hashes.json || true
          if git diff --cached --quiet; then
            echo "No tweeted-hash updates."
          else
            git commit -m "chore: update tweeted_hashes.json [skip ci]"
            git push origin main
          fi
