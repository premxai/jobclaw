version: "3.9"

# ═══════════════════════════════════════════════════════════════════════
# JobClaw — Full Stack Docker Compose
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════════════

services:

  # ── API Server ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobclaw-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://jobclaw:jobclaw@postgres:5432/jobclaw
      - JOBCLAW_API_KEY=${JOBCLAW_API_KEY:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Scraper Worker ────────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobclaw-scraper
    command: >
      python -m scripts.ingestion.run_all_scrapers --tier medium
    environment:
      - DATABASE_URL=postgresql://jobclaw:jobclaw@postgres:5432/jobclaw
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: "no"
    profiles:
      - scrape

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jobclaw-postgres
    environment:
      - POSTGRES_USER=jobclaw
      - POSTGRES_PASSWORD=jobclaw
      - POSTGRES_DB=jobclaw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis (rate limiting, caching) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Prometheus (metrics) ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: jobclaw-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana (dashboards) ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: jobclaw-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=jobclaw
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  pgdata:
  redisdata:
  grafanadata:
